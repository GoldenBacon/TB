<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .control-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            min-width: 200px;
        }
        
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .leaderboard {
            margin-top: 30px;
        }
        
        .leaderboard table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .leaderboard th {
            background: #f5f5f5;
            padding: 15px;
            text-align: left;
            font-weight: bold;
            color: #333;
            border-bottom: 2px solid #ddd;
        }
        
        .leaderboard td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            color: #555;
        }
        
        .leaderboard tr:hover {
            background: #f9f9f9;
        }
        
        .rank {
            font-weight: bold;
            color: #667eea;
            font-size: 1.2em;
        }
        
        .rank-1 { color: #FFD700; } /* Gold */
        .rank-2 { color: #C0C0C0; } /* Silver */
        .rank-3 { color: #CD7F32; } /* Bronze */
        
        .delete-btn {
            background: #ff6b6b;
            padding: 6px 12px;
            font-size: 0.9em;
        }
        
        .delete-btn:hover {
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
        }
        
        .export-btn {
            background: #51cf66;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .export-btn:hover {
            box-shadow: 0 10px 20px rgba(81, 207, 102, 0.4);
        }
        
        .import-btn {
            background: #4dabf7;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .import-btn:hover {
            box-shadow: 0 10px 20px rgba(77, 171, 247, 0.4);
        }
        
        .clear-btn {
            background: #ffa94d;
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .clear-btn:hover {
            box-shadow: 0 10px 20px rgba(255, 164, 77, 0.4);
        }
        
        #fileInput {
            display: none;
        }
        
        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px;
            font-style: italic;
        }
        
        .medal {
            font-size: 1.5em;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Leaderboard</h1>
        
        <div class="input-section">
            <input type="text" id="playerName" placeholder="Enter player name" />
            <input type="number" id="playerScore" placeholder="Enter score" min="0" />
            <button onclick="addScore()">Add Score</button>
        </div>
        
        <div class="control-section">
            <input type="text" id="searchBox" class="search-box" placeholder="🔍 Search players..." onkeyup="filterTable()" />
            <button class="export-btn" onclick="exportScores()">📥 Export</button>
            <button class="import-btn" onclick="document.getElementById('fileInput').click()">📤 Import</button>
            <button class="clear-btn" onclick="clearAll()">🗑️ Clear All</button>
            <input type="file" id="fileInput" accept=".json" onchange="importScores()" />
        </div>
        
        <div class="leaderboard">
            <table id="leaderboardTable">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Score</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" class="empty-message">No scores yet. Add one to get started!</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let scores = JSON.parse(localStorage.getItem('leaderboard')) || [];
        
        function addScore() {
            const name = document.getElementById('playerName').value.trim();
            const score = parseInt(document.getElementById('playerScore').value);
            
            if (!name || isNaN(score) || score < 0) {
                alert('Please enter a valid player name and score');
                return;
            }
            
            // Check if player exists and update
            const existing = scores.find(p => p.name.toLowerCase() === name.toLowerCase());
            if (existing) {
                existing.score = Math.max(existing.score, score);
            } else {
                scores.push({ name, score });
            }
            
            saveScores();
            updateTable();
            
            document.getElementById('playerName').value = '';
            document.getElementById('playerScore').value = '';
            document.getElementById('playerName').focus();
        }
        
        function deleteScore(name) {
            if (confirm(`Delete ${name} from leaderboard?`)) {
                scores = scores.filter(p => p.name !== name);
                saveScores();
                updateTable();
            }
        }
        
        function filterTable() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            const rows = tbody.querySelectorAll('tr');
            
            rows.forEach(row => {
                const playerName = row.children[1]?.textContent.toLowerCase() || '';
                row.style.display = playerName.includes(searchTerm) ? '' : 'none';
            });
        }
        
        function exportScores() {
            if (scores.length === 0) {
                alert('No scores to export!');
                return;
            }
            
            const dataStr = JSON.stringify(scores, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `leaderboard-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }
        
        function importScores() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('Invalid format');
                    
                    // Merge or replace
                    const replace = confirm('Replace existing scores? (Cancel to merge)');
                    if (replace) {
                        scores = imported;
                    } else {
                        // Merge: update existing, add new
                        imported.forEach(newScore => {
                            const existing = scores.find(p => p.name.toLowerCase() === newScore.name.toLowerCase());
                            if (existing) {
                                existing.score = Math.max(existing.score, newScore.score);
                            } else {
                                scores.push(newScore);
                            }
                        });
                    }
                    
                    saveScores();
                    updateTable();
                    alert(`${imported.length} scores imported successfully!`);
                } catch (err) {
                    alert('Error importing file: ' + err.message);
                }
            };
            reader.readAsText(file);
            document.getElementById('fileInput').value = '';
        }
        
        function clearAll() {
            if (confirm('Delete ALL scores? This cannot be undone!')) {
                scores = [];
                saveScores();
                updateTable();
                document.getElementById('searchBox').value = '';
            }
        }
        
        function saveScores() {
            localStorage.setItem('leaderboard', JSON.stringify(scores));
        }
        
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            
            if (scores.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-message">No scores yet. Add one to get started!</td></tr>';
                return;
            }
            
            // Sort by score descending
            scores.sort((a, b) => b.score - a.score);
            
            tbody.innerHTML = scores.map((player, index) => {
                const rank = index + 1;
                let medal = '';
                let rankClass = '';
                
                if (rank === 1) {
                    medal = '🥇';
                    rankClass = 'rank-1';
                } else if (rank === 2) {
                    medal = '🥈';
                    rankClass = 'rank-2';
                } else if (rank === 3) {
                    medal = '🥉';
                    rankClass = 'rank-3';
                }
                
                return `
                    <tr>
                        <td><span class="rank ${rankClass}">${medal} ${rank}</span></td>
                        <td>${player.name}</td>
                        <td><strong>${player.score}</strong></td>
                        <td><button class="delete-btn" onclick="deleteScore('${player.name}')">Delete</button></td>
                    </tr>
                `;
            }).join('');
        }
        
        // Allow Enter key to submit
        document.getElementById('playerScore').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addScore();
        });
        
        // Load and display on page load
        updateTable();
    </script>
</body>
</html>
